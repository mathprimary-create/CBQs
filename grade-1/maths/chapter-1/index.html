<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Grade 1 Number System Interactive</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f2f7ff;
overflow-x:hidden;
}

#splashScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:white;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
flex-direction:column;
}

#splashScreen img{
width:220px;
max-width:80%;
}

#gameContainer{
display:none;
padding:20px;
max-width:900px;
margin:auto;
}

.topBar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
gap:10px;
flex-wrap:wrap;
}

.progressBox{
background:white;
padding:10px 18px;
border-radius:12px;
font-weight:bold;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.scoreBox{
background:white;
padding:10px 18px;
border-radius:12px;
font-weight:bold;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.questionCard{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.12);
text-align:center;
}

.questionText{
font-size:28px;
font-weight:bold;
margin-bottom:25px;
color:#1b2b52;
line-height:1.4;
}

.imageBox img{
width:100%;
max-width:550px;
border-radius:16px;
margin-bottom:25px;
}

.optionsGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
margin-top:20px;
}

.optionBtn{
padding:18px;
border:none;
border-radius:16px;
background:#eaf1ff;
font-size:22px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.optionBtn:hover{
background:#d5e4ff;
transform:scale(1.03);
}

.correct{
background:#7CFC8A !important;
}

.wrong{
background:#ff8a8a !important;
}

#feedbackText{
margin-top:20px;
font-size:26px;
font-weight:bold;
min-height:40px;
}

#nextBtn{
margin-top:25px;
padding:16px 28px;
border:none;
border-radius:16px;
background:#3b82f6;
color:white;
font-size:22px;
font-weight:bold;
cursor:pointer;
display:none;
}

#nextBtn:hover{
background:#2563eb;
}

@media(max-width:768px){

.questionText{
font-size:22px;
}

.optionBtn{
font-size:18px;
padding:14px;
}

.optionsGrid{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div id="splashScreen">
<img src="assets/logo.png">
</div>

<div id="gameContainer">

<div class="topBar">
<div class="progressBox">
Question: <span id="questionNumber">1</span>/20
</div>

<div class="scoreBox">
⭐ Score: <span id="score">0</span>
</div>
</div>

<div class="questionCard">

<div class="questionText" id="questionText">
Loading Question...
</div>

<div class="imageBox">
<img id="questionImage" src="">
</div>

<div class="optionsGrid" id="optionsGrid">
</div>

<div id="feedbackText"></div>

<button id="nextBtn">
Next Question →
</button>

</div>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/claps.mp3"></audio>

<script>

setTimeout(() => {
document.getElementById("splashScreen").style.display = "none";
document.getElementById("gameContainer").style.display = "block";
}, 5000);

let currentQuestion = 0;
let score = 0;

const questions = [

loadQuestion();

</script>

</body>
</html>
